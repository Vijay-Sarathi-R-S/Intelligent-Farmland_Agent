name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -r requirements-dev.txt

      - name: Lint (non-blocking)
        run: |
          python -m flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics || true
          python -m flake8 . --count --exit-zero --max-line-length=120 --statistics || true

      - name: Run tests
        run: |
          python -m pytest -q

      - name: Validate app startup
        run: |
          python -m compileall app.py run.py config.py services
